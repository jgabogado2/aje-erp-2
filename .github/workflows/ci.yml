name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Build-time only needs these to be present, not valid — the app
          # reads them at runtime. CI builds with placeholders so `next build`
          # doesn't fail on missing-env guards.
          AUTH_SECRET: ci-placeholder-secret
          AUTH_GOOGLE_ID: ci-placeholder
          AUTH_GOOGLE_SECRET: ci-placeholder
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder

  # e2e is intentionally NOT run here yet — it needs a live app + a test
  # Supabase project + a way to inject an authenticated session. Wire it up
  # once Vercel preview deployments are available (see PHASE_5_PLAN 5a.3).
